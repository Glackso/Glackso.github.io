<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/xp.css">
    <script src="js/interact.min.js"></script>
</head>
<body>

    <div id="desktop" class="desktop">
        <div class="icon-grid">
            <div class="shortcut" onclick="openApp('my-computer', 'My Computer', 'assets/icons/32/computer.png')">
                <img src="assets/icons/32/computer.png" alt="My Computer" onerror="this.src='https://winxp.vercel.app/icons/explorer.png'">
                <span>My Computer</span>
            </div>
            <div class="shortcut" onclick="openEmptyNotepad()">
                <img src="assets/icons/32/notepad.png" alt="Notepad" onerror="this.src='https://winxp.vercel.app/icons/notepad.png'">
                <span>Notepad</span>
            </div>
            <div class="shortcut">
                <img src="https://winxp.vercel.app/icons/recycle_bin_empty.png" alt="Recycle Bin">
                <span>Recycle Bin</span>
            </div>
            <div class="shortcut">
                <img src="https://winxp.vercel.app/icons/ie.png" alt="Internet Explorer">
                <span>Internet Explorer</span>
            </div>
        </div>

        <div id="notepad" class="window draggable" style="width: 450px; display: none;">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="https://winxp.vercel.app/icons/notepad.png" style="width: 14px; margin-right: 3px; vertical-align: middle;">
                    <span id="notepad-title">Untitled - Notepad</span>
                </div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close" onclick="closeApp('notepad')"></button>
                </div>
            </div>
            <div class="window-body" style="margin: 0; padding: 0;">
                <ul class="menu-bar">
                    <li onclick="toggleMenu('file-menu')">File
                        <ul class="dropdown" id="file-menu">
                            <li>New</li>
                            <li>Open...</li>
                            <li onclick="notepadApp.save()">Save</li>
                            <li class="divider"></li>
                            <li onclick="closeApp('notepad')">Exit</li>
                        </ul>
                    </li>
                    <li>Edit</li>
                    <li>Format</li>
                    <li>View</li>
                    <li>Help</li>
                </ul>
                <textarea spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button"><img src="https://winxp.vercel.app/icons/windows.png" style="width: 16px; margin-right: 5px;">start</button>
        
        <div id="taskbar-apps" class="taskbar-apps"></div>

        <div class="tray">
            <img src="https://winxp.vercel.app/icons/sound.png" style="width: 14px; margin-right: 8px;">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/apps.js"></script>
</body>
</html>
