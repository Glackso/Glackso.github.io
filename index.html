<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Simulator</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apps.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body>
    <div id="desktop" class="desktop">
        <div id="icon-grid" class="icon-grid"></div>
    </div>

    <div class="taskbar">
        <div class="start-button" onclick="toggleStartMenu()">start</div>
        <div id="taskbar-apps"></div>
        <div class="tray"><span id="clock"></span></div>
    </div>

    <div id="start-menu" class="start-menu" style="display:none;"></div>

    <script src="js/filesystem.js"></script>
    <script src="js/apps.js"></script>
    <script src="js/appManager.js"></script>
    <script src="js/system.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
