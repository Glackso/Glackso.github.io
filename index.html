<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/xp.css">
    <script src="js/interact.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="desktop" class="desktop">
        <div class="icon-grid">
            <div class="shortcut draggable-icon" onclick="openApp('my-computer', 'My Computer', 'assets/icons/32/computer.png')">
                <img src="assets/icons/32/computer.png" alt="My Computer" onerror="this.src='https://winxp.vercel.app/icons/explorer.png'">
                <span>My Computer</span>
            </div>
            <div class="shortcut draggable-icon" onclick="notepadApp.openEmpty()">
                <img src="assets/icons/32/notepad.png" alt="Notepad" onerror="this.src='https://winxp.vercel.app/icons/notepad.png'">
                <span>Notepad</span>
            </div>
        </div>

        <div id="my-computer" class="window draggable" onmousedown="focusWindow('my-computer')" style="display: none; width: 450px; top: 50px; left: 50px;">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="assets/icons/32/computer.png" style="width: 14px; margin-right: 3px; vertical-align: middle;" onerror="this.style.display='none'"> 
                    My Computer
                </div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize" onclick="minimizeApp('my-computer')"></button>
                    <button aria-label="Maximize" onclick="maximizeApp('my-computer')"></button>
                    <button aria-label="Close" onclick="closeApp('my-computer')"></button>
                </div>
            </div>
            <div class="window-body">
                <div class="nav-bar">
                    <button onclick="goBack()">Back</button>
                    <span id="current-path" style="margin-left: 10px; font-weight: bold;">C:\</span>
                </div>
                <ul id="file-viewer" class="tree-view" style="height: 250px; overflow-y: auto; margin: 0;"></ul>
            </div>
        </div>

        <div id="notepad" class="window draggable" onmousedown="focusWindow('notepad')" style="display: none; width: 450px; top: 100px; left: 100px;">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="assets/icons/32/notepad.png" style="width: 14px; margin-right: 3px; vertical-align: middle;" onerror="this.style.display='none'">
                    <span id="notepad-title">Untitled - Notepad</span>
                </div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize" onclick="minimizeApp('notepad')"></button>
                    <button aria-label="Maximize" onclick="maximizeApp('notepad')"></button>
                    <button aria-label="Close" onclick="closeApp('notepad')"></button>
                </div>
            </div>
            <div class="window-body" style="margin: 0; padding: 0; display: flex; flex-direction: column; height: 100%;">
                <ul class="menu-bar">
                    <li onclick="toggleMenu('file-menu')">File
                        <ul class="dropdown" id="file-menu">
                            <li onclick="notepadApp.save()">Save</li>
                            <li class="divider"></li>
                            <li onclick="closeApp('notepad')">Exit</li>
                        </ul>
                    </li>
                    <li>Edit</li>
                    <li>Format</li>
                </ul>
                <textarea spellcheck="false" style="flex-grow: 1;"></textarea>
            </div>
        </div>
    </div>

    <div id="start-menu" class="start-menu" style="display: none;">
        <div class="start-menu-header">
            <img src="assets/icons/32/computer.png" style="width: 28px; border-radius: 3px; margin-right: 10px;" onerror="this.src='https://winxp.vercel.app/icons/explorer.png'">
            <span style="font-size: 16px;">Guest</span>
        </div>
        <div class="start-menu-body">
            <div class="start-menu-left">
                <div class="start-item" onclick="notepadApp.openEmpty(); toggleStartMenu();">
                    <img src="assets/icons/32/notepad.png" onerror="this.src='https://winxp.vercel.app/icons/notepad.png'"> 
                    <span style="font-weight: bold;">Notepad</span>
                </div>
            </div>
            <div class="start-menu-right">
                <div class="start-item" onclick="openApp('my-computer', 'My Computer', 'assets/icons/32/computer.png'); toggleStartMenu();">
                    <img src="assets/icons/32/computer.png" style="width: 20px;" onerror="this.src='https://winxp.vercel.app/icons/explorer.png'"> 
                    My Computer
                </div>
            </div>
        </div>
        <div class="start-menu-footer">
            <div class="start-item" style="color: white; justify-content: flex-end; width: 100%;">
                Log Off
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button" onclick="toggleStartMenu()">
            <span style="font-style: italic; font-weight: bold;">start</span>
        </button>
        <div id="taskbar-apps" class="taskbar-apps"></div>
        <div class="tray">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script src="js/filesystem.js"></script>
    <script src="js/apps.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
