<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Simulator - V3.0 Alpha</title>
    <link rel="stylesheet" href="css/themes/luna-blue.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/windows.css">
</head>
<body>
    <div class="desktop" id="desktop">
        <div id="alpha-watermark">V3.0 Early Alpha</div>
        </div>

    <div id="window-layer"></div>

    <div class="taskbar">
        <button id="start-btn" onclick="AudioEngine.play('click'); alert('Start menu coming soon!')">Start</button>
        <div id="taskbar-tray"></div>
    </div>

    <script src="scripts/audioSystem.js"></script>
    <script src="scripts/fileSystem.js"></script>
    <script src="scripts/core.js"></script>
    <script src="scripts/interaction.js"></script>
    
    <script src="apps/notepad.js"></script>

    <script>
        window.onload = () => {
            // Give it a 1-second delay for dramatic effect
            setTimeout(() => {
                AudioEngine.play('startup');
                SystemEngine.launchApp('notepad'); // Auto-launch Notepad for the demo!
            }, 1000);
        };
    </script>
</body>
</html>
