<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/xp.css"> <link rel="stylesheet" href="css/style.css"> </head>
<body>

<div id="desktop">
    <div class="shortcut" onclick="openApp('computer')">
        <img src="assets/icons/32/computer.png" alt="My Computer">
        <span>My Computer</span>
    </div>
    
    <div id="taskbar">
        <button id="start-button">
            <img src="assets/icons/16/computer.png"> 
            <strong>start</strong>
        </button>
        <div id="open-apps"></div>
        <div id="system-tray">9:05 AM</div>
    </div>
</div>

<script src="js/interact.min.js"></script>
<script src="js/filesystem.js"></script>
<script src="js/apps.js"></script>
<script src="js/main.js"></script>
</body>
</html>
