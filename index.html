<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="desktop" class="desktop">
        <div class="shortcut" onclick="openApp('my-computer')">
            <img src="assets/icons/explorer.png" alt="">
            <span>My Computer</span>
        </div>

        <div id="my-computer" class="window draggable">
            <div class="title-bar">
                <div class="title-bar-text">My Computer</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeApp('my-computer')"></button>
                </div>
            </div>
            <div class="window-body">
                <div class="nav-bar">
                    <button onclick="goBack()">Back</button>
                    <span id="current-path">C:\</span>
                </div>
                <ul id="file-viewer" class="tree-view"></ul>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button">start</button>
        <div class="tray">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script src="js/filesystem.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
