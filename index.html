<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/xp.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apps.css">
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-panel">
            <div class="user-selection">
                <div class="user-avatar"></div>
                <div class="user-info">
                    <span class="username">Guest</span>
                    <button class="login-btn" onclick="SystemState.login()">Sign In</button>
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu" class="context-menu" style="display:none;"></div>

    <div id="desktop" class="desktop">
        <div id="icon-grid" class="icon-grid">
            </div>
    </div>

    <div class="taskbar">
        <button class="start-button" onclick="toggleStartMenu()">start</button>
        <div id="taskbar-apps" class="taskbar-apps"></div>
        <div class="tray">
            <img src="assets/icons/16/volume.png" class="tray-icon">
            <span id="clock">00:00</span>
        </div>
    </div>

    <div id="start-menu" class="start-menu" style="display: none;">
        <div class="start-menu-header">
            <div class="header-avatar"></div>
            <span>Guest</span>
        </div>
        <div class="start-menu-body">
            <div class="start-menu-left" id="start-programs"></div>
            <div class="start-menu-right">
                <div class="start-item" onclick="AppManager.open('computer')">My Computer</div>
                <div class="start-item" onclick="AppManager.open('notepad')">Notepad</div>
                <div class="divider"></div>
                <div class="start-item" onclick="AppManager.open('display')">Control Panel</div>
            </div>
        </div>
        <div class="start-menu-footer">
            <button class="logoff-btn" onclick="location.reload()">Log Off</button>
            <button class="shutdown-btn" onclick="SystemState.shutdown()">Turn Off</button>
        </div>
    </div>

    <script src="js/interact.min.js"></script>
    <script src="js/filesystem.js"></script>
    <script src="js/apps.js"></script>
    <script src="js/appManager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/system.js"></script>

    <script>
        // Initialize once DOM is ready
        window.onload = () => {
            bootSystem();
        };
    </script>
</body>
</html>
