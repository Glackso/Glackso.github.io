<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/xp.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apps.css">
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <button onclick="SystemState.login()">Sign In</button>
    </div>

    <div id="desktop" class="desktop">
        <div id="icon-grid" class="icon-grid"></div>
    </div>

    <div class="taskbar">
        <button class="start-button" onclick="toggleStartMenu()">start</button>
        <div id="taskbar-apps"></div>
        <div class="tray"><span id="clock"></span></div>
    </div>
    
    <div id="start-menu" class="start-menu" style="display:none;"></div>
</body>
</html>
