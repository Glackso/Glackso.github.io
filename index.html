<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desktop">
    <div class="icon" onclick="openWindow()">
        <img src="images/icons/computer.png" alt="My Computer">
        My Computer
    </div>
</div>

<div class="window" id="myComputer">
    <div class="title-bar" id="windowHeader">
        <span>My Computer</span>
        <div class="window-controls">
            <button onclick="closeWindow()">_</button>
            <button onclick="closeWindow()" class="close">X</button>
        </div>
    </div>
    <div class="content">
        <p><strong>System Tasks</strong></p>
        <ul>
            <li>View system information</li>
            <li>Add or remove programs</li>
            <li>Change a setting</li>
        </ul>
        <hr>
        <p>Hard Disk Drives: (C:)</p>
    </div>
</div>

<div class="taskbar">
    <div class="start-button">start</div>
</div>

<script src="scripts/main.js"></script>

</body>
</html>
