<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apps.css">
</head>
<body>

<div id="bootScreen" class="boot-screen">
    <div class="boot-content">
        <h2>Windows XP Simulator</h2>
        <p>Click anywhere to power on...</p>
    </div>
</div>

<div class="desktop">
    <div class="icon" onclick="openApp('myComputer')">
        <img src="images/icons/48x48/computer.png" alt="My Computer">
        My Computer
    </div>
    <div class="icon" onclick="openApp('notepad')">
        <img src="images/icons/48x48/notepad.png" alt="Notepad" onerror="this.src='images/icons/48x48/computer.png'">
        Notepad
    </div>
</div>

<div class="window" id="myComputer" style="top: 50px; left: 100px;">
    <div class="title-bar">
        <span>My Computer</span>
        <div class="window-controls">
            <button onclick="closeApp('myComputer')">_</button>
            <button onclick="closeApp('myComputer')" class="close">X</button>
        </div>
    </div>
    <div class="content">
        <p><strong>System Tasks</strong></p>
        <ul>
            <li>View system information</li>
            <li>Add or remove programs</li>
        </ul>
        <hr>
        <p>Hard Disk Drives: (C:)</p>
    </div>
</div>

<div class="window" id="notepad" style="top: 150px; left: 200px;">
    <div class="title-bar">
        <span>Untitled - Notepad</span>
        <div class="window-controls">
            <button onclick="closeApp('notepad')">_</button>
            <button onclick="closeApp('notepad')" class="close">X</button>
        </div>
    </div>
    <div class="menu-bar">
        <span onclick="saveNotepadText()">File (Save)</span>
        <span>Edit</span>
        <span>Format</span>
        <span>View</span>
        <span>Help</span>
    </div>
    <div class="notepad-content">
        <textarea spellcheck="false"></textarea>
    </div>
</div>

<div class="taskbar">
    <div class="start-button">start</div>
</div>

<script src="scripts/main.js"></script>
<script src="scripts/apps/notepad.js"></script>

</body>
</html>
